            copyOutputToInput() {
                // Check if we have computed output
                if (this.computedOutput.length === 0) {
                    alert('No output to copy. Please run the convolution first.');
                    return;
                }

                // Save current state to history before copying
                this.saveInputToHistory();

                // Get the output dimensions
                const outputRows = this.computedOutput.length;
                const outputCols = this.computedOutput[0].length;

                // Update input dimensions
                this.inputRows = outputRows;
                this.inputCols = outputCols;
                document.getElementById('inputRows').value = outputRows;
                document.getElementById('inputCols').value = outputCols;

                // Enable extended range for input (allows -inf to +inf with kernel colors)
                this.inputExtendedRange = true;

                // Copy output values to input
                // Apply ReLU if it's currently enabled
                this.inputData = Array(outputRows).fill(0).map((_, i) => 
                    Array(outputCols).fill(0).map((_, j) => {
                        let value = this.computedOutput[i][j];
                        if (this.reluApplied) {
                            value = Math.max(0, value);
                        }
                        // No clamping - allow full range
                        return value;
                    })
                );

                // Recompute and render
                this.computeConvolution();
                this.renderAll();
            }

            importImage(event) {
                const file = event.target.files[0];
                if (!file) return;

                // Check if it's an image
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file.');
                    event.target.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Save current state to history before importing
                        this.saveInputToHistory();
                        
                        // Calculate dimensions (max 8x8)
                        let width = img.width;
                        let height = img.height;
                        const maxSize = 8;

                        // Scale down if larger than max
                        if (width > maxSize || height > maxSize) {
                            const scale = Math.min(maxSize / width, maxSize / height);
                            width = Math.round(width * scale);
                            height = Math.round(height * scale);
                        }

                        // Ensure at least 3x3
                        width = Math.max(3, Math.min(8, width));
                        height = Math.max(3, Math.min(8, height));

                        // Create canvas to process image
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');

                        // Draw and resize image
                        ctx.drawImage(img, 0, 0, width, height);

                        // Get image data
                        const imageData = ctx.getImageData(0, 0, width, height);
                        const pixels = imageData.data;

                        // Convert to grayscale matrix [0, 1] where 0=white, 1=black
                        const grayscaleMatrix = [];
                        for (let y = 0; y < height; y++) {
                            const row = [];
                            for (let x = 0; x < width; x++) {
                                const idx = (y * width + x) * 4;
                                const r = pixels[idx];
                                const g = pixels[idx + 1];
                                const b = pixels[idx + 2];
                                
                                // Convert to grayscale using standard weights
                                // Then invert: 1 - gray so that 0=white, 1=black
                                const gray = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                                row.push(1 - gray);
                            }
                            grayscaleMatrix.push(row);
                        }

                        // Update input with image data
                        this.inputRows = height;
                        this.inputCols = width;
                        document.getElementById('inputRows').value = height;
                        document.getElementById('inputCols').value = width;
                        this.inputData = grayscaleMatrix;
                        
                        // Reset to normal range mode (grayscale)
                        this.inputExtendedRange = false;

                        // Recompute and render
                        this.computeConvolution();
                        this.renderAll();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);

                // Reset file input
                event.target.value = '';
            }

            translateInput(direction) {
                // Save current state to history before translating
                if (typeof this.saveInputToHistory === 'function') {
                    this.saveInputToHistory();
                }
                
                // Create a copy of the current data
                const oldData = this.inputData.map(row => [...row]);
                
                // Create new empty matrix
                const newData = Array(this.inputRows).fill(0).map(() => 
                    Array(this.inputCols).fill(0)
                );

                // Copy data with translation
                for (let i = 0; i < this.inputRows; i++) {
                    for (let j = 0; j < this.inputCols; j++) {
                        let sourceI = i;
                        let sourceJ = j;

                        switch(direction) {
                            case 'up':
                                sourceI = (i + 1) % this.inputRows;
                                break;
                            case 'down':
                                sourceI = (i - 1 + this.inputRows) % this.inputRows;
                                break;
                            case 'left':
                                sourceJ = (j + 1) % this.inputCols;
                                break;
                            case 'right':
                                sourceJ = (j - 1 + this.inputCols) % this.inputCols;
                                break;
                        }

                        newData[i][j] = oldData[sourceI][sourceJ];
                    }
                }

                this.inputData = newData;
                this.computeConvolution();
                this.renderAll();
            }

            rotateInput(direction) {
                // Save current state to history before rotating
                if (typeof this.saveInputToHistory === 'function') {
                    this.saveInputToHistory();
                }
                
                // Create a new matrix for rotation
                const newData = Array(this.inputCols).fill(0).map(() => 
                    Array(this.inputRows).fill(0)
                );

                for (let i = 0; i < this.inputRows; i++) {
                    for (let j = 0; j < this.inputCols; j++) {
                        if (direction === 'cw') {
                            // Clockwise: (i,j) -> (j, rows-1-i)
                            newData[j][this.inputRows - 1 - i] = this.inputData[i][j];
                        } else {
                            // Counter-clockwise: (i,j) -> (cols-1-j, i)
                            newData[this.inputCols - 1 - j][i] = this.inputData[i][j];
                        }
                    }
                }

                // Swap dimensions
                const tempRows = this.inputRows;
                this.inputRows = this.inputCols;
                this.inputCols = tempRows;

                // Update UI
                document.getElementById('inputRows').value = this.inputRows;
                document.getElementById('inputCols').value = this.inputCols;

                this.inputData = newData;
                this.computeConvolution();
                this.renderAll();
            }

            saveInputToHistory() {
                // Create a snapshot of the current input state
                const snapshot = {
                    data: this.inputData.map(row => [...row]),
                    rows: this.inputRows,
                    cols: this.inputCols,
                    extendedRange: this.inputExtendedRange
                };

                // If we're not at the end of history, remove all items after current index
                if (this.currentHistoryIndex < this.inputHistory.length - 1) {
                    this.inputHistory = this.inputHistory.slice(0, this.currentHistoryIndex + 1);
                }

                // Add new snapshot to history
                this.inputHistory.push(snapshot);
                this.currentHistoryIndex++;

                // Limit history size
                if (this.inputHistory.length > this.maxHistorySize) {
                    this.inputHistory.shift();
                    this.currentHistoryIndex--;
                }

                if (typeof this.updatePreviousButtonState === 'function') {
                    this.updatePreviousButtonState();
                }
            }

            updatePreviousButtonState() {
                const button = document.getElementById('previousInputButton');
                if (button) {
                    button.disabled = this.currentHistoryIndex <= 0;
                }
            }

            loadPreviousInput() {
                // Check if there's a previous state
                if (this.currentHistoryIndex <= 0) {
                    return;
                }

                // Move back in history
                this.currentHistoryIndex--;
                const snapshot = this.inputHistory[this.currentHistoryIndex];

                // Restore the snapshot
                this.inputData = snapshot.data.map(row => [...row]);
                this.inputRows = snapshot.rows;
                this.inputCols = snapshot.cols;
                this.inputExtendedRange = snapshot.extendedRange;

                // Update UI
                document.getElementById('inputRows').value = this.inputRows;
                document.getElementById('inputCols').value = this.inputCols;

                // Re-render
                this.computeConvolution();
                this.renderAll();
            }

            clearInputMatrix() {
                // Save current state to history before clearing
                if (typeof this.saveInputToHistory === 'function') {
                    this.saveInputToHistory();
                }

                // Reset all cells to 0
                this.inputData = Array(this.inputRows).fill(0).map(() => 
                    Array(this.inputCols).fill(0)
                );

                // Reset to normal range mode (grayscale)
                this.inputExtendedRange = false;

                // Recompute and render
                this.computeConvolution();
                this.renderAll();
            }

            clearKernelMatrix() {
                // Reset all cells to 0
                this.kernelData = Array(this.kernelSize).fill(0).map(() =>

                );

                // Recompute and render
                this.computeConvolution();
                this.renderAll();

            async copyMatrixAsImage(matrixType) {
                try {
                    // Get the appropriate matrix element
                    let matrixElement;
                    if (matrixType === 'input') {
                        matrixElement = document.getElementById('inputMatrix');
                    } else if (matrixType === 'kernel') {
                        matrixElement = document.getElementById('kernelMatrix');
                    } else if (matrixType === 'output') {
                        matrixElement = document.getElementById('outputMatrix');
                    }

                    if (!matrixElement) {
                        alert('Matrix not found');
                        return;
                    }

                    // Create a canvas with the matrix size
                    const canvas = document.createElement('canvas');
                    const rect = matrixElement.getBoundingClientRect();
                    
                    // Set canvas size to match the matrix element
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // Fill with white background
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Get all cells
                    const cells = matrixElement.querySelectorAll('.matrix-cell');
                    const computedStyle = getComputedStyle(matrixElement);
                    const gap = parseInt(computedStyle.gap) || 3;
                    
                    // Calculate cell size
                    const cellSize = 50;
                    
                    // Draw each cell
                    cells.forEach((cell, index) => {
                        const cellRect = cell.getBoundingClientRect();
                        const x = cellRect.left - rect.left;
                        const y = cellRect.top - rect.top;
                        
                        // Get cell background color
                        const bgColor = getComputedStyle(cell).backgroundColor;
                        ctx.fillStyle = bgColor;
                        ctx.fillRect(x, y, cellSize, cellSize);
                        
                        // Draw cell text
                        const text = cell.textContent;
                        const textColor = getComputedStyle(cell).color;
                        ctx.fillStyle = textColor;
                        ctx.font = '600 13px "Plus Jakarta Sans", sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(text, x + cellSize / 2, y + cellSize / 2);
                    });

                    // Convert canvas to blob
                    canvas.toBlob(async (blob) => {
                        try {
                            await navigator.clipboard.write([
                                new ClipboardItem({
                                    'image/png': blob
                                })
                            ]);
                        } catch (err) {
                            console.error('Failed to copy image:', err);
                        }
                    });
                } catch (error) {
                    console.error('Error copying matrix as image:', error);
                }
            }

                    type: 'input',
                    rows: this.inputRows,
                    cols: this.inputCols,
                    data: this.inputData,
                    extendedRange: this.inputExtendedRange

                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });

                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        
                        if (json.type !== 'input') {
                            alert('Invalid file: This is not an input matrix file.');

                        // Save current state to history before importing
                        this.saveInputToHistory();

                        // Update dimensions
                        this.inputRows = json.rows;
                        this.inputCols = json.cols;
                        document.getElementById('inputRows').value = json.rows;
                        document.getElementById('inputCols').value = json.cols;

                        // Update data and extended range flag
                        this.inputData = json.data;
                        this.inputExtendedRange = json.extendedRange || false;

                        // Re-render
                        this.computeConvolution();
                        this.renderAll();
                    } catch (error) {
                        alert('Error importing file: ' + error.message);
                    }
                };
                reader.readAsText(file);
                
                // Reset file input
                event.target.value = '';
            }

            translateInput(direction) {
                // Save current state to history before translating
                if (typeof this.saveInputToHistory === 'function') {
                    this.saveInputToHistory();
                }
                
                // Create a copy of the current data
                const oldData = this.inputData.map(row => [...row]);
                
                // Create new empty matrix
                const newData = Array(this.inputRows).fill(0).map(() => 
                    Array(this.inputCols).fill(0)
                );

                // Copy data with translation
                for (let i = 0; i < this.inputRows; i++) {
                    for (let j = 0; j < this.inputCols; j++) {
                        let sourceI = i;
                        let sourceJ = j;

                        switch(direction) {
                            case 'up':
                                sourceI = (i + 1) % this.inputRows;
                                break;
                            case 'down':
                                sourceI = (i - 1 + this.inputRows) % this.inputRows;
                                break;
                            case 'left':
                                sourceJ = (j + 1) % this.inputCols;
                                break;
                            case 'right':
                                sourceJ = (j - 1 + this.inputCols) % this.inputCols;
                                break;
                        }

                        newData[i][j] = oldData[sourceI][sourceJ];
                    }
                }

                this.inputData = newData;
                this.computeConvolution();
                this.renderAll();
            }

            rotateInput(direction) {
                // Save current state to history before rotating
                if (typeof this.saveInputToHistory === 'function') {
                    this.saveInputToHistory();
                }
                
                // Create a new matrix for rotation
                const newData = Array(this.inputCols).fill(0).map(() => 
                    Array(this.inputRows).fill(0)
                );

                for (let i = 0; i < this.inputRows; i++) {
                    for (let j = 0; j < this.inputCols; j++) {
                        if (direction === 'cw') {
                            // Clockwise: (i,j) -> (j, rows-1-i)
                            newData[j][this.inputRows - 1 - i] = this.inputData[i][j];
                        } else {
                            // Counter-clockwise: (i,j) -> (cols-1-j, i)
                            newData[this.inputCols - 1 - j][i] = this.inputData[i][j];
                        }
                    }
                }

                // Swap dimensions
                const tempRows = this.inputRows;
                this.inputRows = this.inputCols;
                this.inputCols = tempRows;

                // Update UI
                document.getElementById('inputRows').value = this.inputRows;
                document.getElementById('inputCols').value = this.inputCols;

                this.inputData = newData;
                this.computeConvolution();
                this.renderAll();
            }
